{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

<div class="card">

<div class="card-body">

<h2>Edit Expense</h2>

<form method="POST">

{% csrf_token %}

<div class="mb-3">
<label>Date</label>
<input type="date"
       name="expense_date"
       value="{{ expense.expense_date|date:'Y-m-d' }}"
       class="form-control">
</div>

<div class="mb-3">
<label>Category</label>
<input type="text"
       name="category"
       value="{{ expense.category }}"
       class="form-control">
</div>

<div class="mb-3">
<label>Description</label>
<input type="text"
       name="description"
       value="{{ expense.description }}"
       class="form-control">
</div>

<div class="mb-3">
<label>Amount</label>
<input type="number"
       step="0.001"
       name="amount"
       value="{{ expense.amount }}"
       class="form-control">
</div>

<button class="btn btn-success">
Save Changes
</button>

</form>

</div>
</div>

</div>

{% endblock %}
