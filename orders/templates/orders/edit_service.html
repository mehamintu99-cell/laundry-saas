{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <h2>Edit Service</h2>

    <div class="card">

        <div class="card-body">
{% if error %}

<div class="alert alert-danger">
    {{ error }}
</div>

{% endif %}

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">

                    <label>Category</label>

                    <select
                        name="category"
                        class="form-control">

                        {% for category in categories %}

                        <option
                            value="{{ category.id }}"
                            {% if category.id == service.category.id %}
                            selected
                            {% endif %}>

                            {{ category.name }}

                        </option>

                        {% endfor %}

                    </select>

                </div>

                <div class="mb-3">

                    <label>Service Name</label>

                    <input
                        type="text"
                        name="name"
                        value="{{ service.name }}"
                        class="form-control">

                </div>

                <div class="mb-3">

                    <label>Price</label>

                    <input
                        type="number"
                        step="0.001"
                        name="price"
min="0.001"
                        value="{{ service.price }}"
                        class="form-control">

                </div>

                <button
                    type="submit"
                    class="btn btn-success">

                    Save Changes

                </button>

                <a href="/services/"
                   class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
