{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <h2>
        📊 Service Summary Report
    </h2>

    <div class="card mb-4">

        <div class="card-body">

            <form method="GET">

                <div class="row">

                    <div class="col-md-4">

                        <label>From Date</label>

                        <input type="date"
                               name="from_date"
                               value="{{ from_date }}"
                               class="form-control">

                    </div>

                    <div class="col-md-4">

                        <label>To Date</label>

                        <input type="date"
                               name="to_date"
                               value="{{ to_date }}"
                               class="form-control">

                    </div>

                    <div class="col-md-4 d-flex align-items-end">

                        <button class="btn btn-primary">

                            Generate

                        </button>

                    </div>

                </div>

            </form>

        </div>

    </div>

    {% if summary %}

    <table class="table table-bordered table-striped">

        <thead class="table-info">

            <tr>

                <th>Service</th>
                <th>Total Quantity</th>
                <th>Revenue</th>

            </tr>

        </thead>

        <tbody>

        {% for service, data in summary %}

            <tr>

                <td>

                    {{ service }}

                </td>

                <td>

                    {{ data.quantity }}

                </td>

                <td>

                    {{ data.revenue|floatformat:3 }}

                </td>

            </tr>

        {% endfor %}

        </tbody>

    </table>

    {% endif %}

</div>

{% endblock %}
