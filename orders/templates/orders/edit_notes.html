{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <h2>Edit Notes</h2>

    <form method="POST">

        {% csrf_token %}

        <textarea
            name="notes"
            class="form-control"
            rows="6">{{ order.notes }}</textarea>

        <br>

        <button
            class="btn btn-primary">

            Save Notes

        </button>

    </form>

</div>

{% endblock %}
