{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-body">

            <h2 class="mb-4">

                Add New Shop

            </h2>
{% if error %}

<div class="alert alert-danger">

    {{ error }}

</div>

{% endif %}

            <form method="POST">

    {% csrf_token %}

    <div class="mb-3">

        <label class="form-label">

            Shop Name

        </label>

        <input

            type="text"

            name="name"

            class="form-control"

            required

        >

    </div>

    <div class="mb-3">

        <label class="form-label">

            Username

        </label>

        <input

            type="text"

            name="username"

            class="form-control"

            required

        >

    </div>

    <div class="mb-3">

        <label class="form-label">

            Password

        </label>

        <input

            type="password"

            name="password"

            class="form-control"

            required

        >

    </div>

    <div class="mb-3">

        <label class="form-label">

            Phone

        </label>

        <input

            type="text"

            name="phone"

            class="form-control"

        >

    </div>

    <div class="mb-3">

        <label class="form-label">

            Address

        </label>

        <textarea

            name="address"

            class="form-control"

            rows="3"

        ></textarea>

    </div>

    <div class="mb-3">

        <label class="form-label">

            Default Delivery Days

        </label>

        <input

            type="number"

            name="default_delivery_days"

            class="form-control"

            value="2"

            min="1"

        >

    </div>


    <!-- Subscription Section -->

   

<!-- Subscription Section -->

<hr>

<h4 class="mb-3">

    Subscription Details

</h4>

<div class="mb-3">

    <label class="form-label">

        Subscription Plan

    </label>

    <select

        name="plan"

        class="form-select"

    >

        <option value="TRIAL" selected>

            Trial

        </option>

        <option value="BASIC">

            Basic

        </option>

        <option value="PREMIUM">

            Premium

        </option>

    </select>

</div>


<div class="mb-3">

    <label class="form-label">

        Monthly Fee

    </label>

    <input

        type="number"

        step="0.01"

        name="monthly_fee"

        class="form-control"

        value="0"

    >

</div>


<div class="mb-3">

    <label class="form-label">

        Payment Status

    </label>

    <select

        name="payment_status"

        class="form-select"

    >

        <option value="PENDING" selected>

            Pending

        </option>

        <option value="PAID">

            Paid

        </option>

    </select>

</div>


<div class="mb-3">

    <label class="form-label">

        Notes

    </label>

    <textarea

        name="notes"

        class="form-control"

        rows="3"

        placeholder="Optional notes"

    ></textarea>

</div>


<button

    type="submit"

    class="btn btn-success"

>

    Save Shop

</button>

<a

    href="/shops/"

    class="btn btn-secondary"

>

    Cancel

</a>

  

 

</form>
        </div>

    </div>

</div>

{% endblock %}
