{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-body">

            <h2 class="mb-4">

                Add New Shop

            </h2>
{% if error %}

<div class="alert alert-danger">

    {{ error }}

</div>

{% endif %}

            <form method="POST">

    {% csrf_token %}

    <div class="mb-3">

        <label class="form-label">

            Shop Name

        </label>

        <input

            type="text"

            name="name"

            class="form-control"

            required

        >

    </div>


<div class="mb-3">

    <label class="form-label">

        Owner Name

    </label>

    <input

        type="text"

        name="full_name"

        class="form-control"

        required

    >

</div>



    <div class="mb-3">

        <label class="form-label">

            Username

        </label>

        <input

            type="text"

            name="username"

            class="form-control"

            required

        >

    </div>

    <div class="mb-3">

        <label class="form-label">

            Password

        </label>

        <input

            type="password"

            name="password"

            class="form-control"

            required

        >

    </div>

    <div class="mb-3">

        <label class="form-label">

            Phone

        </label>

        <input

            type="text"

            name="phone"

            class="form-control"

        >

    </div>

    <div class="mb-3">

        <label class="form-label">

            Address

        </label>

        <textarea

            name="address"

            class="form-control"

            rows="3"

        ></textarea>

    </div>

    <!-- Country -->

<div class="mb-3">

    <label class="form-label">

        Country

    </label>

    <select

        name="country"

        id="country"

        class="form-select"

        onchange="updateCurrency()"

        required>

        <option value="Oman" selected>

            Oman

        </option>

        <option value="India">

            India

        </option>

        <option value="UAE">

            UAE

        </option>

        <option value="Saudi Arabia">

            Saudi Arabia

        </option>

        <option value="Qatar">

            Qatar

        </option>

        <option value="Bahrain">

            Bahrain

        </option>

        <option value="Kuwait">

            Kuwait

        </option>

    </select>

</div>

<!--country code -->

<div class="mb-3">

    <label class="form-label">

        WhatsApp Country Code

    </label>

    <input

        type="text"
ss
        name="whatsapp_country_code"

        class="form-control"

        value="968"

        placeholder="968">

</div>

<!-- Currency -->

<div class="mb-3">

    <label class="form-label">

        Currency

    </label>

    <input

        type="text"

        name="currency"

        id="currency"

        class="form-control"

        value="OMR"

        readonly>

</div>


<!-- Decimal Places -->

<div class="mb-3">

    <label class="form-label">

        Decimal Places

    </label>

    <input

        type="number"

        name="decimal_places"

        id="decimal_places"

        class="form-control"

        value="3"

        readonly>

</div>


<!-- Default Delivery Days -->

<div class="mb-3">

    <label class="form-label">

        Default Delivery Days

    </label>

    <input

        type="number"

        name="default_delivery_days"

        class="form-control"

        value="2"

        min="1">

</div>


    <!-- Subscription Section -->

   

<!-- Subscription Section -->

<hr>

<h4 class="mb-3">

    Subscription Details

</h4>

<div class="mb-3">

    <label class="form-label">

        Subscription Plan

    </label>

    <select

        name="plan"

        class="form-select"

    >

        <option value="TRIAL" selected>

            Trial

        </option>

        <option value="BASIC">

            Basic

        </option>

        <option value="PREMIUM">

            Premium

        </option>

    </select>

</div>


<div class="mb-3">

    <label class="form-label">

        Monthly Fee

    </label>

    <input

        type="number"

        step="0.01"

        name="monthly_fee"

        class="form-control"

        value="0"

    >

</div>


<div class="mb-3">

    <label class="form-label">

        Payment Status

    </label>

    <select

        name="payment_status"

        class="form-select"

    >

        <option value="PENDING" selected>

            Pending

        </option>

        <option value="PAID">

            Paid

        </option>

    </select>

</div>


<div class="mb-3">

    <label class="form-label">

        Notes

    </label>

    <textarea

        name="notes"

        class="form-control"

        rows="3"

        placeholder="Optional notes"

    ></textarea>

</div>


<button

    type="submit"

    class="btn btn-success"

>

    Save Shop

</button>

<a

    href="/shops/"

    class="btn btn-secondary"

>

    Cancel

</a>

  

 

</form>
        </div>

    </div>

</div>
<script>

function updateCurrency(){

    let country =

        document.getElementById(

            "country"

        ).value;


    let currency = "OMR";

    let decimals = 3;


    if(country=="India"){

        currency="INR";

        decimals=2;

    }

    else if(country=="UAE"){

        currency="AED";

        decimals=2;

    }

    else if(country=="Saudi Arabia"){

        currency="SAR";

        decimals=2;

    }

    else if(country=="Qatar"){

        currency="QAR";

        decimals=2;

    }

    else if(country=="Bahrain"){

        currency="BHD";

        decimals=3;

    }

    else if(country=="Kuwait"){

        currency="KWD";

        decimals=3;

    }


    document.getElementById(

        "currency"

    ).value = currency;


    document.getElementById(

        "decimal_places"

    ).value = decimals;

}

</script>
{% endblock %}
