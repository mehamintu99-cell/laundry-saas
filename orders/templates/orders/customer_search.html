<!DOCTYPE html>
<html>
<head>
    <title>Customer Search</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

    <h2>📱 Customer Lookup</h2>

    <form method="POST">

        {% csrf_token %}

        <input
            type="text"
            name="phone"
            class="form-control"
            placeholder="Enter Mobile Number">

        <button
            class="btn btn-primary mt-2">

            Search

        </button>

    </form>
{% if customer %}

<div class="card mt-4">

    <div class="card-body">

        <h4>Customer Found</h4>

        <p>Name: {{ customer.name }}</p>

        <p>Phone: {{ customer.phone }}</p>

        <a href="/new-order/?customer={{ customer.id }}"
           class="btn btn-success">

            Create Order

        </a>

    </div>

</div>

{% else %}

<div class="card mt-4">

    <div class="card-body">

        <h4>Customer Not Found</h4>

        <a href="/add-customer/"
           class="btn btn-primary">

            ➕ Add New Customer

        </a>

    </div>

</div>

{% endif %}

</div>

</body>
</html>
