{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="card">

        <div class="card-body">

            <h2>Edit Category</h2>

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">

                    <label>Category Name</label>

                    <input
                        type="text"
                        name="name"
                        value="{{ category.name }}"
                        class="form-control"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn btn-success">

                    Save Changes

                </button>

                <a href="/categories/"
                   class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
