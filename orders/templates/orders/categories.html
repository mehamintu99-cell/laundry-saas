{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <h2>

        Service Categories

    </h2>

    <div class="card mb-4">

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-8">

                        <input
                            type="text"
                            name="name"
                            placeholder="Category Name"
                            class="form-control"
                            required>

                    </div>

                    <div class="col-md-4">

                        <button
                            type="submit"
                            class="btn btn-primary w-100">

                            Add Category

                        </button>

                    </div>

                </div>

            </form>

        </div>

    </div>

    <table class="table table-bordered">

        <thead class="table-light">

            <tr>

                <th>Name</th>
                <th width="120">Action</th>

            </tr>

        </thead>

        <tbody>

        {% for category in categories %}

            <tr>

                <td>

                    {{ category.name }}

                </td>

                <td>
<a href="/category/edit/{{ category.id }}/"
       class="btn btn-primary btn-sm">

        Edit

    </a>

                    <a href="/category/delete/{{ category.id }}/"
                       class="btn btn-danger btn-sm">

                        Delete

                    </a>

                </td>

            </tr>

        {% empty %}

            <tr>

                <td colspan="2">

                    No categories found

                </td>

            </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
