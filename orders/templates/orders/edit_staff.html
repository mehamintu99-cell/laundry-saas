{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

<div class="card shadow">

<div class="card-body">

<h2>

Edit Staff

</h2>

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label>

Full Name

</label>

<input

type="text"

name="full_name"

class="form-control"

value="{{ staff.full_name }}"

required>

</div>


<div class="mb-3">

<label>

Username

</label>

<input

type="text"

class="form-control"

value="{{ staff.user.username }}"

readonly>

</div>


<div class="mb-3">

<label>

New Password

</label>

<input

type="password"

name="password"

class="form-control"

placeholder="Leave blank if no change">

</div>


<button

type="submit"

class="btn btn-success">

Save

</button>


<a

href="/staff/"

class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</div>

{% endblock %}
