<!DOCTYPE html>
<html>

<head>

    <title>Laundry Laundry Management System | EBS IT Solutions</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-4">

            <div class="card mt-5 shadow">

                <div class="card-body">

                    <div class="text-center mb-4">

    <h2>

        Laundry Management System

    </h2>

    <p class="text-muted">

        By Elevate Business Systems IT Solutions

    </p>

</div>

                    {% if messages %}

                        {% for message in messages %}

                            <div class="alert alert-danger">

                                {{ message }}

                            </div>

                        {% endfor %}

                    {% endif %}

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label>

                                Username

                            </label>

                            <input
                                type="text"
                                name="username"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label>

                                Password

                            </label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                required>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary w-100">

                            Login

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>
<footer class="text-center mt-5 mb-3 text-muted">

    Powered by
    <strong>
        Elevate Business Systems IT Solutions
    </strong>

    <br>

    Version 1.0

</footer>
</body>

</html>
