{% load static %}

<!DOCTYPE html>

<html>

<head>

    <title>

        Laundry Management System |
        EBS IT Solutions

    </title>

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <link

        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"

        rel="stylesheet"

    >

</head>

<body class="bg-light">

<div class="container min-vh-100 d-flex justify-content-center align-items-center">

    <div class="row justify-content-center w-100">

        <div class="col-md-4 col-sm-8 col-11">

            <div

                class="card shadow mx-auto"

                style="

                    max-width:420px;

                    width:100%;

                    border-radius:18px;

                "

            >

                <div class="card-body p-4">

                    <div class="text-center mb-4">

                        <img

                            src="{% static 'images/LMS.png' %}"

                            width="90"

                            class="mb-3"

                            alt="LMS Logo"

                        >

                        <h2 class="fw-bold">

                            Laundry Management System

                        </h2>

                        <p class="text-muted small mb-0">

                            By Elevate Business Systems

                        </p>

                        <p class="text-muted small">

                            IT Solutions

                        </p>

                    </div>

                    {% if messages %}

                        {% for message in messages %}

                            <div class="alert alert-danger">

                                {{ message }}

                            </div>

                        {% endfor %}

                    {% endif %}

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">

                                Username

                            </label>

                            <input

                                type="text"

                                name="username"

                                class="form-control"

                                required

                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Password

                            </label>

                            <input

                                type="password"

                                name="password"

                                class="form-control"

                                required

                            >

                        </div>

                        <button

                            type="submit"

                            class="btn btn-primary w-100"

                        >

                            Login

                        </button>

                    </form>

                </div>

            </div>

            <
