{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-body">

            <h2>Edit Customer</h2>
{% if error %}

<div class="alert alert-danger">

    {{ error }}

</div>

{% endif %}

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">

                    <label>Name</label>

                    <input
                        type="text"
                        name="name"
                        value="{{ customer.name }}"
                        class="form-control"
                        required>

                </div>

                <div class="mb-3">

                    <label>Phone</label>

                    <input
                        type="text"
                        name="phone"
                        value="{{ customer.phone }}"
                        class="form-control"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn btn-success">

                    Save Changes

                </button>

                <a href="/customer/{{ customer.id }}/"
                   class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
