
{% extends 'base.html' %}

{% block content %}


<div class="container mt-4">

    <h2>Add Customer</h2>
{% if error %}

<div class="alert alert-danger">

    {{ error }}

</div>

{% endif %}

    <form method="POST">

        {% csrf_token %}

        <label>Name</label>

        <input type="text"
       name="name"
       class="form-control"
       required>

        <label>Phone</label>

        <input type="text"
       name="phone"
       class="form-control"
       required>

        <button class="btn btn-success">

            Save Customer

        </button>

    </form>

</div>

{% endblock %}
